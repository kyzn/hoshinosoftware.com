<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hoshino Software & Security</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --bg: #07060d;
      --bg-2: #110a22;
      --fg: #e8e6f5;
      --muted: #9d97c2;
      --accent: #b48bff;
      --accent-2: #5ec8ff;
      --border: rgba(180, 139, 255, 0.18);
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      color: var(--fg);
      background:
        radial-gradient(1200px 600px at 50% -10%, rgba(94, 200, 255, 0.18), transparent 60%),
        radial-gradient(900px 500px at 50% 110%, rgba(180, 139, 255, 0.18), transparent 60%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      display: flex;
      min-height: 100vh;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }

    .hero {
      max-width: 480px;
    }

    .logo {
      width: min(280px, 60vw);
      height: auto;
      border-radius: 18px;
      box-shadow:
        0 0 0 1px var(--border),
        0 20px 60px rgba(94, 100, 255, 0.35),
        0 8px 24px rgba(0, 0, 0, 0.6);
    }

    h1 {
      margin: 28px 0 6px;
      font-weight: 700;
      font-size: 26px;
      letter-spacing: 0.5px;
      background: linear-gradient(90deg, var(--accent-2), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .jp {
      margin: 0 0 4px;
      color: var(--muted);
      font-size: 14px;
      letter-spacing: 1px;
    }

    .tag {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .app-list {
      list-style: none;
      padding: 0;
      margin: 32px 0 0;
      display: grid;
      gap: 10px;
    }
    .app-list a {
      display: block;
      padding: 12px 18px;
      color: var(--fg);
      text-decoration: none;
      font-size: 15px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.02);
      transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
    }
    .app-list a:hover {
      border-color: var(--accent);
      background: rgba(180, 139, 255, 0.08);
      transform: translateY(-1px);
    }

    footer {
      text-align: center;
      padding: 14px;
      font-size: 12px;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }
  </style>
</head>

<body>

<main>
  <div class="hero">
    <img class="logo" src="./hoshino.png" alt="Hoshino Software & Security logo">
    <h1>Hoshino Software & Security</h1>
    <p class="jp">星野ソフトウェア＆セキュリティ</p>
    <p class="tag">Software Development & Security Research</p>
    <ul class="app-list">
      <li><a href="./codereader/">Barcode QR Reader</a></li>
      <li><a href="./metronome/">Metronome Watch Special</a></li>
    </ul>
  </div>
</main>

<footer>
  © 2026 Hoshino Software & Security. All rights reserved.
</footer>

</body>
</html>
