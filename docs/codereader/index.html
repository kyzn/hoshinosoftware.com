<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Barcode QR Reader</title>
<script>
var match = window.location.hash.match(/^#(support|legal)-([a-zA-Z-]+)$/);
var dest = match
  ? '/codereader/' + match[2] + '/#' + match[1]
  : '/codereader/en';
window.location.replace(dest);
</script>
</head>
<body>
<p>Redirecting to <a href="/codereader/en">/codereader/en</a>...</p>
</body>
</html>
